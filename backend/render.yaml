services:
  - type: web
    name: goalflow-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@goalflow.app
      - key: FRONTEND_URL
        sync: false
      - key: ENVIRONMENT
        value: production
